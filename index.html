<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADO - 茶の湯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght=200;300;400&family=Playfair+Display:ital,wght=0,400;1,400&display=swap');
        
        body {
            font-family: 'Noto Serif JP', 'Playfair Display', serif;
            background-color: #f4f3ef; 
            color: #2c2c2a;
        }

        /* クリックによる動画の一時停止を防止 */
        video {
            pointer-events: none;
        }
    </style>
</head>
<body class="overflow-x-hidden antialiased tracking-[0.18em]">

    <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-6 mix-blend-difference text-white">
        <div class="text-xl font-light tracking-[0.3em]">閑雲会</div>
        <nav class="hidden md:flex space-x-12 text-xs uppercase tracking-[0.25em]">
            <a href="#" class="hover:opacity-50 transition-opacity">Concept</a>
            <a href="#" class="hover:opacity-50 transition-opacity">Sado / Experience</a>
            <a href="#" class="hover:opacity-50 transition-opacity">Landscape</a>
            <a href="#" class="hover:opacity-50 transition-opacity">Contact</a>
        </nav>
    </header>

    <main class="relative min-h-screen flex flex-col justify-center items-center px-4 overflow-hidden">
        
        <!-- 💡 スマホ環境（iPhone 14 Proなど）での見え方を調整：デフォルトを object-contain に、PC（md:）以上を object-cover に分離 -->
        <video id="hero-video" autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-contain md:object-cover z-0 opacity-0 max-w-full max-h-screen mx-auto">
            <source src="tankosya.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <!-- 💡 背景グラデーションが動画の境界線と自然に馴染むように調整 -->
        <div class="absolute inset-0 bg-gradient-to-tr from-[#f4f3ef]/90 via-[#eae6df]/75 to-[#e6ebe0]/85 backdrop-blur-[1px] z-10"></div>

        <div class="relative z-20 flex flex-col items-center select-none w-full max-w-xl min-h-[600px] justify-center">
            
            <p id="hero-sub" class="text-[10px] md:text-xs uppercase tracking-[0.4em] text-[#61645c] mb-12 opacity-0 text-center">
            </p>
            
            <div id="hero-main-container" class="my-4 min-h-[350px] flex items-center justify-center absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 origin-center">
                <h1 id="hero-main" class="text-3xl md:text-4xl font-extralight [writing-mode:vertical-rl] tracking-[0.5em] leading-loose opacity-0">
                </h1>
            </div>
            
            <div class="pt-[400px] flex flex-col items-center">
                <div id="hero-line" class="w-[1px] h-0 bg-[#2c2c2a] opacity-30 mx-auto my-8"></div>
                <p id="hero-desc" class="text-xs md:text-sm font-light tracking-[0.2em] text-[#41433f] leading-loose opacity-0 text-center mt-4"></p>
            </div>
        </div>

        <div id="scroll-text" class="absolute bottom-12 left-1/2 -translate-x-1/2 z-20 text-[9px] tracking-[0.3em] uppercase opacity-40">
            Scroll down
        </div>
    </main>

    <section class="relative min-h-screen flex items-center justify-center py-32 px-8 bg-[#eae8e3] z-30">
        <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-12 gap-12 items-center">
            
            <div id="content-img" class="md:col-span-6 relative aspect-[3/4] bg-gradient-to-b from-[#d5dad1] to-[#cbd2c6] shadow-inner overflow-hidden opacity-0 transform translate-y-12">
                <div class="absolute inset-0 flex items-center justify-center text-xs text-[#787c73] font-light tracking-[0.2em]">
                    [ 霧深い茶庭の記憶 ]
                </div>
            </div>

            <div id="content-text" class="md:col-span-5 md:col-start-8 space-y-8 opacity-0 transform translate-y-12">
                <span class="text-[10px] uppercase tracking-[0.4em] text-[#8e9388] block">— 01 / Spatial Architecture</span>
                <h2 class="text-2xl md:text-3xl font-light tracking-[0.25em] leading-normal text-[#3a3b38]">
                    空間を、引き算のロジックで調律する。
                </h2>
                <p class="text-xs md:text-sm font-light leading-relaxed text-[#61645c] tracking-[0.18em]">
                    造園の草むしりから始まる、土地の微細なデバッグ。お茶の点前に潜む、完璧なコンポーネント設計。私たちは、古びた伝統をただ守るのではない。
                    前衛的な若者やアーティストの感性に突き刺さる、圧倒的に「淡く、鋭い」美意識をシステムとして実装します。
                </p>
                <div class="pt-4">
                    <a href="#" class="inline-block text-[11px] uppercase tracking-[0.3em] border-b border-[#2c2c2a] pb-1 hover:opacity-50 transition-opacity">
                        Explore Membership
                    </a>
                </div>
            </div>

        </div>
    </section>

    <script>
        const ZEN_WORDS = [
            {
                sub: "The green mountains become greener after the rain",
                main: "雨後青山青転青",
                desc: "雨が過ぎ去ったのち、山々はさらにその青さを増していく。<br>削ぎ落とされた空間に、本質がより鮮明に浮かび上がる。"
            }
        ];

        function getWeekNumber() {
            const now = new Date();
            const startOfYear = new Date(now.getFullYear(), 0, 1);
            const pastDaysOfYear = (now - startOfYear) / (1000 * 60 * 60 * 24);
            const currentWeek = Math.floor((pastDaysOfYear + startOfYear.getDay() + 1) / 7);
            return currentWeek % ZEN_WORDS.length;
        }

        gsap.registerPlugin(ScrollTrigger);

        window.addEventListener('DOMContentLoaded', () => {
            
            const weekIndex = getWeekNumber();
            const currentData = ZEN_WORDS[weekIndex];

            if (currentData) {
                document.getElementById('hero-sub').innerHTML = currentData.sub;
                document.getElementById('hero-main').innerHTML = currentData.main;
                document.getElementById('hero-desc').innerHTML = currentData.desc;
            }

            const tl = gsap.timeline();
            tl.to("#hero-sub", { opacity: 1, y: 0, duration: 1.2, ease: "power3.out", delay: 0.5 })
              .to("#hero-main", { opacity: 1, duration: 1.8, ease: "power2.out" }, "-=0.6")
              .to("#hero-line", { height: "64px", duration: 1.2, ease: "power2.inOut" }, "-=1.2")
              .to("#hero-desc", { opacity: 1, y: 0, duration: 1.4, ease: "power3.out" }, "-=0.4");

            gsap.delayedCall(5.0, () => {
                const video = document.getElementById('hero-video');
                if (video) {
                    video.play();
                    gsap.to(video, { opacity: 1, duration: 2.0, ease: "power1.inOut" });
                }
            });

            // 縦書き見出しの移動
            gsap.timeline()
              .to("#hero-main-container", {
                top: "140px",              
                left: "auto",
                right: "32px",
                x: 0,
                y: 0,
                scale: 0.7,                
                duration: 2.5,             
                ease: "power3.inOut",
                delay: 5.0                 
              })
              .to("#hero-main-container", {
                opacity: 0,
                duration: 1.5,
                ease: "power2.out",
                delay: 12.5
              });

            gsap.to("#scroll-text", {
                opacity: 0,
                duration: 1.0,
                scrollTrigger: {
                    trigger: "section",
                    start: "top 90%",
                    toggleActions: "play none none reverse"
                }
            });

            gsap.to("#content-img", {
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: "power4.out",
                scrollTrigger: {
                    trigger: "#content-img",
                    start: "top 80%",
                }
            });

            gsap.to("#content-text", {
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: "power4.out",
                delay: 0.3,
                scrollTrigger: {
                    trigger: "#content-text",
                    start: "top 80%",
                }
            });
        });
    </script>
</body>
</html>
